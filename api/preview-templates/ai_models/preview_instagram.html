<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PROMPT CACHING — Instagram</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 1080px;
            height: 1920px;
            overflow: hidden;
            font-family: 'Space Grotesk', sans-serif;
            background: #14110b;
            color: #ece8dc;
            position: relative;
        }

        /* CORNER BRACKETS */
        .bracket {
            position: absolute;
            width: 90px;
            height: 90px;
            z-index: 40;
        }
        .bracket::before, .bracket::after {
            content: '';
            position: absolute;
            background: #ece8dc;
        }
        .bracket.tl { top: 60px; left: 60px; }
        .bracket.tl::before { top: 0; left: 0; width: 90px; height: 8px; }
        .bracket.tl::after  { top: 0; left: 0; width: 8px; height: 90px; }
        .bracket.tr { top: 60px; right: 60px; }
        .bracket.tr::before { top: 0; right: 0; width: 90px; height: 8px; }
        .bracket.tr::after  { top: 0; right: 0; width: 8px; height: 90px; }
        .bracket.bl { bottom: 60px; left: 60px; }
        .bracket.bl::before { bottom: 0; left: 0; width: 90px; height: 8px; }
        .bracket.bl::after  { bottom: 0; left: 0; width: 8px; height: 90px; }
        .bracket.br { bottom: 60px; right: 60px; }
        .bracket.br::before { bottom: 0; right: 0; width: 90px; height: 8px; }
        .bracket.br::after  { bottom: 0; right: 0; width: 8px; height: 90px; }

        /* NEURAL NETWORK (top) */
        .nn {
            position: absolute;
            top: 260px;
            left: 50%;
            transform: translateX(-50%);
            width: 820px;
            height: 300px;
            z-index: 10;
        }

        /* VECTOR SPACE GRAPH (bottom) */
        .graph {
            position: absolute;
            bottom: 240px;
            left: 50%;
            transform: translateX(-50%);
            width: 900px;
            height: 300px;
            z-index: 10;
        }

        /* CENTER TITLE - sticker block on one line */
        .title {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-2deg);
            background: #14110b;
            color: #ece8dc;
            padding: 56px 60px;
            border: 6px solid #ece8dc;
            box-shadow: 16px 16px 0 #ece8dc;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 84px;
            max-width: 880px;
            letter-spacing: -3px;
            text-transform: uppercase;
            white-space: normal;
            overflow-wrap: break-word;
            text-align: center;
            line-height: 1.02;
            z-index: 30;
        }
        .title .vs {
            display: inline;
            font-size: 70px;
            font-weight: 400;
            font-style: italic;
            letter-spacing: -2px;
            color: #ff2d2d;
            text-transform: lowercase;
            margin: 0 8px;
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <!-- CORNERS -->
    <div class="bracket tl"></div>
    <div class="bracket tr"></div>
    <div class="bracket bl"></div>
    <div class="bracket br"></div>

    <!-- NEURAL NETWORK -->

        <g stroke="#ece8dc" stroke-width="1.8" stroke-opacity="0.55" fill="none">
