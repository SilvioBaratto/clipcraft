<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, height=1440">
    <title>Resta Vulcanica - Preview TikTok</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 1080px;
            height: 1440px;
            overflow: hidden;
            background: #E86428;
            position: relative;
        }

        /* Subtle grain texture */
        .grain {
            position: absolute;
            width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            opacity: 0.04;
            pointer-events: none;
            z-index: 100;
        }

        /* Cloud shape — overlapping circles form organic smoke */
        .cloud {
            position: absolute;
            background: #F2D9B0;
            border-radius: 50%;
            z-index: 20;
        }

        /* Main body */
        .c1  { width: 620px; height: 440px; top: 120px; left: 230px; }
        /* Top bumps */
        .c2  { width: 400px; height: 330px; top: 15px;  left: 340px; }
        .c3  { width: 310px; height: 290px; top: 45px;  left: 105px; }
        .c4  { width: 330px; height: 300px; top: 40px;  left: 645px; }
        /* Side bumps */
        .c5  { width: 275px; height: 255px; top: 255px; left: 45px; }
        .c6  { width: 295px; height: 265px; top: 245px; left: 740px; }
        /* Lower bumps */
        .c7  { width: 265px; height: 225px; top: 420px; left: 195px; }
        .c8  { width: 275px; height: 225px; top: 410px; left: 620px; }
        /* Stem connecting to lava */
        .c9  { width: 230px; height: 210px; top: 530px; left: 425px; }
        .c10 { width: 180px; height: 180px; top: 650px; left: 450px; }
        .c11 { width: 145px; height: 160px; top: 745px; left: 468px; }

        /* Title text */
        .title {
            position: absolute;
            top: 80px;
            left: 0;
            right: 0;
            height: 500px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 30;
            font-family: 'Luckiest Guy', 'Impact', 'Arial Black', sans-serif;
            font-size: 120px;
            color: #1B3868;
            text-align: center;
            line-height: 1.1;
            letter-spacing: 4px;
        }

        /* Lava blobs */
        .lava {
            position: absolute;
            background: #CC2C14;
            z-index: 15;
        }

        .l1 { width: 95px;  height: 135px; top: 810px; left: 492px; border-radius: 42% 58% 52% 48%; }
        .l2 { width: 68px;  height: 100px; top: 785px; left: 430px; border-radius: 55% 40% 50% 48%; }
        .l3 { width: 72px;  height: 110px; top: 795px; left: 570px; border-radius: 40% 58% 45% 52%; }
        .l4 { width: 48px;  height: 68px;  top: 765px; left: 522px; border-radius: 50% 46% 54% 50%; }
        .l5 { width: 58px;  height: 85px;  top: 835px; left: 535px; border-radius: 48% 52% 50% 44%; }

        /* Volcano */
        .volcano {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 620px;
            background: #8E3218;
            clip-path: polygon(
                0% 100%,
                26% 10%,
                39% 0%,
                43% 6%,
                57% 6%,
                61% 0%,
                74% 10%,
                100% 100%
            );
            z-index: 10;
        }

        /* Credit text — outside safe zone */
        .credit {
            position: absolute;
            bottom: 40px;
            left: 350px;
            right: 60px;
            font-family: 'Arial', sans-serif;
            font-size: 22px;
            color: rgba(255, 255, 255, 0.45);
            text-align: center;
            letter-spacing: 3px;
            text-transform: uppercase;
            z-index: 50;
        }
    </style>
</head>
<body>
    <div class="grain"></div>

    <!-- Cloud shape -->
    <div class="cloud c1"></div>
    <div class="cloud c2"></div>
    <div class="cloud c3"></div>
    <div class="cloud c4"></div>
    <div class="cloud c5"></div>
    <div class="cloud c6"></div>
    <div class="cloud c7"></div>
    <div class="cloud c8"></div>
    <div class="cloud c9"></div>
    <div class="cloud c10"></div>
    <div class="cloud c11"></div>

    <!-- Title -->
    <div class="title">VIDEO<br>VULCANICO</div>

    <!-- Lava eruption -->
    <div class="lava l1"></div>
    <div class="lava l2"></div>
    <div class="lava l3"></div>
    <div class="lava l4"></div>
    <div class="lava l5"></div>

    <!-- Volcano -->
    <div class="volcano"></div>

    <!-- Credit -->
    <div class="credit"></div>
</body>
</html>
