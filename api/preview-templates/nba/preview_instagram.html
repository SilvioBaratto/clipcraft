<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, height=1920">
    <title>NBA Playoff Prediction (Instagram)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1080px;
            height: 1920px;
            overflow: hidden;
            font-family: 'Space Grotesk', -apple-system, sans-serif;
            background: #0a0a0a;
            position: relative;
        }

        .noise {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            opacity: 0.04;
            pointer-events: none;
            z-index: 100;
        }

        /* Bold diagonal stripe - NBA blue */
        .diagonal-stripe {
            position: absolute;
            width: 200%;
            height: 400px;
            background: linear-gradient(90deg, #1D428A 0%, #003DA5 50%, #1D428A 100%);
            top: 50%;
            left: -50%;
            transform: rotate(-6deg) translateY(-50%);
            box-shadow: 0 0 120px rgba(29, 66, 138, 0.5);
        }

        /* Red accent stripe */
        .diagonal-stripe-2 {
            position: absolute;
            width: 200%;
            height: 100px;
            background: #C8102E;
            top: 36%;
            left: -50%;
            transform: rotate(-6deg);
            box-shadow: 0 8px 0 #000;
        }

        /* Thin white stripe */
        .diagonal-stripe-3 {
            position: absolute;
            width: 200%;
            height: 28px;
            background: rgba(255,255,255,0.15);
            top: 63%;
            left: -50%;
            transform: rotate(-6deg);
        }

        .geo-block { position: absolute; }

        .block-1 {
            width: 140px;
            height: 140px;
            top: 5%;
            right: 5%;
            background: #C8102E;
            transform: rotate(12deg);
            box-shadow: 10px 10px 0 #000;
        }

        .block-2 {
            width: 100px;
            height: 100px;
            bottom: 24%;
            left: 4%;
            background: #1D428A;
            transform: rotate(-8deg);
            box-shadow: 7px 7px 0 #000;
        }

        .block-3 {
            width: 55px;
            height: 200px;
            top: 12%;
            left: 3%;
            background: #C8102E;
            transform: rotate(3deg);
        }

        .block-4 {
            width: 80px;
            height: 80px;
            top: 74%;
            right: 6%;
            background: #1D428A;
            transform: rotate(20deg);
            box-shadow: 6px 6px 0 #C8102E;
        }

        .court-line { position: absolute; border-radius: 50%; }

        .court-line-1 {
            width: 220px;
            height: 220px;
            bottom: 28%;
            right: 2%;
            border: 12px solid #C8102E;
        }

        .court-line-2 {
            width: 140px;
            height: 140px;
            top: 16%;
            left: 20%;
            border: 8px solid #1D428A;
        }

        .court-line-3 {
            width: 70px;
            height: 70px;
            bottom: 13%;
            left: 34%;
            background: #C8102E;
        }

        /* Jordan silhouette - large background watermark */
        .jordan-bg {
            position: absolute;
            top: 12%;
            right: -4%;
            width: 650px;
            height: 650px;
            z-index: 3;
            opacity: 0.08;
        }

        .jordan-bg img {
            width: 100%;
            height: 100%;
            filter: invert(1);
        }

        /* Jordan silhouette - foreground accent */
        .jordan-fg {
            position: absolute;
            bottom: 26%;
            left: 2%;
            width: 400px;
            height: 400px;
            z-index: 40;
            opacity: 0.9;
        }

        .jordan-fg img {
            width: 100%;
            height: 100%;
            filter: invert(15%) sepia(95%) saturate(6000%) hue-rotate(348deg) brightness(80%) contrast(100%);
            drop-shadow: 8px 8px 0 rgba(0,0,0,0.6);
        }

        .content {
            position: absolute;
            top: 47%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 50;
            width: 92%;
        }

        .title-block {
            background: #000;
            padding: 60px 50px;
            display: inline-block;
            transform: rotate(-2deg);
            box-shadow: 16px 16px 0 #C8102E;
            border: 5px solid #fff;
        }

        .line-pre {
            display: block;
            color: #fff;
            font-size: 42px;
            font-weight: 700;
            letter-spacing: 8px;
            margin-bottom: 20px;
            text-transform: uppercase;
            opacity: 0.6;
        }

        .line-1 {
            display: block;
            font-size: 140px;
            font-weight: 700;
            letter-spacing: -6px;
            color: #fff;
            text-transform: uppercase;
            line-height: 0.9;
        }

        .line-2 {
            display: block;
            font-size: 140px;
            font-weight: 700;
            letter-spacing: -6px;
            color: #C8102E;
            text-transform: uppercase;
            line-height: 0.9;
            margin-top: 5px;
        }

        .line-sub {
            display: block;
            color: #fff;
            font-size: 40px;
            font-weight: 700;
            letter-spacing: 2px;
            margin-top: 30px;
            text-transform: uppercase;
            opacity: 0.7;
        }

        .part-badge {
            position: absolute;
            bottom: 16%;
            left: 50%;
            transform: translateX(-50%) rotate(3deg);
            background: #C8102E;
            color: #fff;
            padding: 30px 70px;
            font-size: 46px;
            font-weight: 700;
            letter-spacing: 6px;
            text-transform: uppercase;
            box-shadow: 10px 10px 0 #000;
            border: 4px solid #fff;
            z-index: 60;
        }

        .part-number {
            color: #ffcc00;
        }

        .emoji-sticker {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            box-shadow: 7px 7px 0 #000;
        }

        .sticker-1 {
            font-size: 110px;
            width: 160px;
            height: 160px;
            background: #fff;
            top: 3%;
            left: 6%;
            transform: rotate(-12deg);
        }

        .sticker-2 {
            font-size: 75px;
            width: 115px;
            height: 115px;
            background: #1D428A;
            top: 8%;
            right: 28%;
            transform: rotate(8deg);
        }

        .sticker-3 {
            font-size: 100px;
            width: 150px;
            height: 150px;
            background: #fff;
            bottom: 4%;
            right: 6%;
            transform: rotate(10deg);
        }

        .sticker-4 {
            font-size: 65px;
            width: 100px;
            height: 100px;
            background: #1D428A;
            bottom: 33%;
            left: 2%;
            transform: rotate(-5deg);
        }

        .star {
            position: absolute;
            color: #C8102E;
            font-size: 50px;
        }

        .star-1 { top: 14%; left: 44%; transform: rotate(15deg); }
        .star-2 { bottom: 23%; right: 24%; transform: rotate(-10deg); color: #ffcc00; }
        .star-3 { top: 72%; left: 7%; transform: rotate(20deg); color: #1D428A; }

        .profile-zone {
            position: absolute;
            bottom: 30px;
            left: 30px;
            width: 256px;
            height: 256px;
        }

        .dots-pattern {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 240px;
            background-image: radial-gradient(circle, rgba(255,255,255,0.06) 2px, transparent 2px);
            background-size: 30px 30px;
            z-index: 1;
        }

        .court-marks {
            position: absolute;
            top: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(90deg, transparent 96%, rgba(255,255,255,0.03) 96%),
                linear-gradient(0deg, transparent 96%, rgba(255,255,255,0.03) 96%);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 2;
        }
    </style>
</head>
<body>
    <div class="noise"></div>
    <div class="court-marks"></div>

    <div class="diagonal-stripe"></div>
    <div class="diagonal-stripe-2"></div>
    <div class="diagonal-stripe-3"></div>

    <div class="geo-block block-1"></div>
    <div class="geo-block block-2"></div>
    <div class="geo-block block-3"></div>
    <div class="geo-block block-4"></div>

    <div class="court-line court-line-1"></div>
    <div class="court-line court-line-2"></div>
    <div class="court-line court-line-3"></div>

    <!-- Jordan silhouettes -->
    <div class="jordan-bg"><img src="jordan.svg" alt=""></div>
    <div class="jordan-fg"><img src="jordan.svg" alt=""></div>

    <div class="dots-pattern"></div>

    <div class="star star-1">✦</div>
    <div class="star star-2">✦</div>
    <div class="star star-3">✦</div>

    <div class="emoji-sticker sticker-1">🏀</div>
    <div class="emoji-sticker sticker-2">📊</div>
    <div class="emoji-sticker sticker-3">🏀</div>
    <div class="emoji-sticker sticker-4">🤖</div>

    <div class="content">
        <div class="title-block">
            <span class="line-pre">Serie</span>
            <span class="line-1">NBA</span>
            <span class="line-2">Playoff</span>
            <span class="line-sub">Prediction</span>
        </div>
    </div>

    <div class="part-badge">
        Parte <span class="part-number">{{PARTE}}</span>
    </div>

    <div class="profile-zone"></div>
</body>
</html>
