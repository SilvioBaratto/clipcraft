<div class="h-dvh overflow-hidden flex flex-col md:block bg-surface">
  <!-- Skip link (target: #main-content) -->
  <a href="#main-content" class="skip-link">Skip to content</a>

  <!-- Sidebar (desktop only) -->
  <app-sidebar [isOpen]="isSidebarOpen()" [isMobile]="isMobile()"></app-sidebar>

  <!-- Shared mobile top bar — brand only (no hamburger; navigation lives in the
       bottom tab bar, mirroring the ITAL-IA layout). -->
  <header
    class="md:hidden flex items-center gap-2 h-14 px-4 border-b border-border bg-surface-raised shrink-0"
    aria-label="Top bar">
    <span class="w-7 h-7 rounded-lg bg-primary flex items-center justify-center p-1.5 shrink-0">
      <img src="assets/logo/logo_icon.svg" alt="" class="w-full h-full invert" aria-hidden="true" />
    </span>
    <span class="text-base font-display font-semibold tracking-tight text-text">ClipCraft</span>
  </header>

  <!-- Main content -->
  <!-- focus:outline-none — this region is focused programmatically on every route
       change (for scroll reset / screen-reader announcement), so the global
       :focus-visible ring must not draw a line under the top bar. -->
  <main id="main-content" tabindex="-1" aria-label="Main content"
        class="md:pl-64 flex-1 min-h-0 overflow-y-auto overscroll-contain [scrollbar-gutter:stable] md:h-dvh flex flex-col focus:outline-none focus-visible:outline-none">
    <!-- Single content column: every page inherits the same width + padding.
         scrollbar-gutter:stable reserves the scrollbar space on every page so the
         column is pixel-identical whether or not the page scrolls. -->
    <div class="mx-auto w-full max-w-5xl px-6 py-6 md:px-8 md:py-8">
      <router-outlet></router-outlet>
    </div>
  </main>

  <!-- Mobile bottom navigation (component is md:hidden + sticky bottom) -->
  <app-bottom-tab-bar class="shrink-0" />

  <!-- aria-live route announcer (screen-reader only) -->
  <div aria-live="polite" aria-atomic="true" class="sr-only">{{ announced() }}</div>

  <!-- Toast outlet -->
  <div id="toast-outlet">
    <app-toast />
  </div>
</div>
