@if (isOpen()) {
<!-- Modal Backdrop -->
<div class="modal-backdrop fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/40"
    (click)="onBackdropClick($event)" (keydown.escape)="onClose()">

    <!-- Modal Content -->
    <div class="relative w-full max-w-2xl rounded-2xl border border-border bg-surface-raised shadow-xl animate-fade-in-up">

        <!-- Header -->
        <div class="flex items-center justify-between gap-4 border-b border-border px-6 py-4">
            <div class="flex items-center gap-3">
                <span class="flex h-10 w-10 items-center justify-center rounded-xl bg-primary text-white">
                    <lucide-icon name="Plus" class="w-5 h-5" aria-hidden="true" />
                </span>
                <div>
                    <h2 class="text-base font-semibold text-text">New Project</h2>
                    <p class="text-sm text-text-secondary">Import your script</p>
                </div>
            </div>
            <button (click)="onClose()" [disabled]="isCreating()"
                class="rounded-md p-1.5 text-text-secondary transition-colors hover:bg-surface-inset hover:text-text disabled:opacity-50 disabled:cursor-not-allowed"
                aria-label="Close dialog">
                <lucide-icon name="X" class="w-5 h-5" aria-hidden="true" />
            </button>
        </div>

        <!-- Body -->
        <div class="px-6 py-4">
            <div class="space-y-2">
                <label class="block text-sm font-medium text-text">
                    Script Content
                </label>
                <textarea [(ngModel)]="scriptContent" rows="16" [disabled]="isCreating()"
                    class="block w-full resize-y border-0 bg-transparent p-0 font-mono text-sm leading-relaxed text-text placeholder:text-text-tertiary focus:outline-none focus:ring-0 disabled:opacity-50 disabled:cursor-not-allowed"
                    placeholder="## 🎯 Hook

Come fa Shazam a riconoscere una canzone in 3 secondi?

## 🎬 Script

Shazam non ascolta tutta la canzone, cerca solo le impronte digitali.

Ogni canzone ha un pattern unico, come le tue impronte digitali.

L'app confronta questi pattern con un database gigante.

Seguimi per altre curiosità tech!"></textarea>
            </div>
        </div>

        <!-- Footer -->
        <div class="flex items-center justify-end gap-3 rounded-b-2xl border-t border-border bg-surface-inset px-6 py-4">
            <button (click)="onClose()" [disabled]="isCreating()"
                class="inline-flex min-h-11 items-center rounded-md border border-border bg-surface-raised px-5 py-2 text-sm font-medium text-text transition-colors hover:bg-surface-inset disabled:opacity-50 disabled:cursor-not-allowed">
                Cancel
            </button>
            <button (click)="onCreate()" [disabled]="!scriptContent().trim() || isCreating()"
                class="inline-flex min-h-11 items-center gap-2 rounded-md bg-primary px-6 py-2 text-sm font-semibold text-white transition-colors hover:bg-primary-hover disabled:opacity-50 disabled:cursor-not-allowed">
                @if (isCreating()) {
                    <lucide-icon name="loader-2" class="w-4 h-4 animate-spin" aria-hidden="true" />
                    <span>Creating...</span>
                } @else {
                    <lucide-icon name="Check" class="w-4 h-4" aria-hidden="true" />
                    <span>Create Project</span>
                }
            </button>
        </div>
    </div>
</div>
}
